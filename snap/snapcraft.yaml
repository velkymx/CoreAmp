name: coreamp
base: core22
version: '0.1.0'
summary: Lightweight, privacy-first audio player
description: |
  CoreAmp is a minimalist media player built for modern desktops.
  It focuses on zero-config usability, high-performance audio, 
  and local ownership of your metadata.

grade: stable
confinement: strict

apps:
  coreamp:
    command: usr/bin/coreamp-app
    extensions: [gnome]
    common-id: com.coreamp.desktop
    plugs:
      - audio-playback
      - network
      - network-bind
      - opengl
      - wayland
      - x11
      - home
      - removable-media

parts:
  coreamp-app:
    plugin: dump
    source: .
    override-build: |
      # Install Rust & Tauri CLI if not present
      if ! command -v cargo >/dev/null; then
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        source "$HOME/.cargo/env"
      fi
      if ! command -v cargo-tauri >/dev/null; then
        cargo install tauri-cli --locked
      fi

      # Build the .deb package
      cd coreamp-app
      cargo tauri build --bundles deb

      # Find and extract the .deb into the snap install directory
      DEB_FILE=$(find target/release/bundle/deb -name "*.deb" | head -n 1)
      dpkg -x "$DEB_FILE" "$SNAPCRAFT_PART_INSTALL/"
    build-packages:
      - libwebkit2gtk-4.1-dev
      - libasound2-dev
      - libssl-dev
      - pkg-config
      - libgtk-3-dev
      - librsvg2-dev
      - libayatana-appindicator3-dev
      - curl
      - build-essential
    stage-packages:
      - libwebkit2gtk-4.1-0
      - libasound2
      - libgtk-3-0
      - librsvg2-common
      - libayatana-appindicator3-1
