name: Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libasound2-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./ -> target"

      - name: Verify workspace
        run: |
          cargo fmt --all --check
          cargo check --workspace
          cargo test --workspace
          cargo clippy --workspace --all-targets -- -D warnings

  linux:
    needs: verify
    runs-on: ubuntu-22.04
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libasound2-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            patchelf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./ -> target"

      - name: Build Linux bundles
        run: |
          bash packaging/linux/build-deb.sh
          bash packaging/linux/build-appimage.sh

      - name: Collect updater artifacts
        run: |
          mkdir -p target/packages/linux
          BUNDLE_DIR="target/release/bundle"
          # Copy AppImage updater bundle and signature
          find "${BUNDLE_DIR}/appimage" -name '*.AppImage.tar.gz' -exec cp {} target/packages/linux/ \; 2>/dev/null || true
          find "${BUNDLE_DIR}/appimage" -name '*.AppImage.tar.gz.sig' -exec cp {} target/packages/linux/ \; 2>/dev/null || true

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v5
        with:
          name: coreamp-linux-bundles
          path: target/packages/linux/

      - name: Publish Linux release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/packages/linux/*
          draft: true

  macos:
    needs: verify
    runs-on: macos-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
      MACOSX_DEPLOYMENT_TARGET: "10.13"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./ -> target"

      - name: Build macOS bundles
        run: bash packaging/macos/build-app.sh

      - name: Collect updater artifacts
        run: |
          mkdir -p target/packages/macos
          # Tauri produces signed .tar.gz updater bundles per target
          # Collect from the ARM build (used for updater; universal .zip is for manual install)
          find target/aarch64-apple-darwin/release/bundle/macos -name '*.app.tar.gz' -exec cp {} target/packages/macos/ \; 2>/dev/null || true
          find target/aarch64-apple-darwin/release/bundle/macos -name '*.app.tar.gz.sig' -exec cp {} target/packages/macos/ \; 2>/dev/null || true

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v5
        with:
          name: coreamp-macos-bundles
          path: target/packages/macos/

      - name: Publish macOS release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/packages/macos/*
          draft: true

  updater-json:
    needs: [linux, macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Generate latest.json
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          REPO="velkymx/CoreAmp"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Read signatures
          MACOS_SIG=""
          LINUX_SIG=""
          if [ -f artifacts/coreamp-macos-bundles/*.app.tar.gz.sig ]; then
            MACOS_SIG=$(cat artifacts/coreamp-macos-bundles/*.app.tar.gz.sig)
          fi
          if [ -f artifacts/coreamp-linux-bundles/*.AppImage.tar.gz.sig ]; then
            LINUX_SIG=$(cat artifacts/coreamp-linux-bundles/*.AppImage.tar.gz.sig)
          fi

          # Find artifact filenames
          MACOS_FILE=$(ls artifacts/coreamp-macos-bundles/*.app.tar.gz 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")
          LINUX_FILE=$(ls artifacts/coreamp-linux-bundles/*.AppImage.tar.gz 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")

          # Build latest.json
          cat > latest.json << ENDJSON
          {
            "version": "${VERSION}",
            "notes": "CoreAmp ${VERSION} is available. See release notes on GitHub.",
            "pub_date": "${DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${MACOS_SIG}",
                "url": "${BASE_URL}/${MACOS_FILE}"
              },
              "darwin-x86_64": {
                "signature": "${MACOS_SIG}",
                "url": "${BASE_URL}/${MACOS_FILE}"
              },
              "linux-x86_64": {
                "signature": "${LINUX_SIG}",
                "url": "${BASE_URL}/${LINUX_FILE}"
              }
            }
          }
          ENDJSON

          cat latest.json

      - name: Upload latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json
          draft: true
