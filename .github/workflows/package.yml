name: Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./ -> target"

      - name: Verify workspace
        run: |
          cargo check --workspace
          cargo test --workspace
          cargo clippy --workspace --all-targets -- -D warnings

  linux:
    needs: verify
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./ -> target"

      - name: Build Linux bundles
        run: |
          bash packaging/linux/build-deb.sh
          bash packaging/linux/build-appimage.sh

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coreamp-linux-bundles
          path: target/packages/linux/

      - name: Publish Linux release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/packages/linux/*
          draft: true

  macos:
    needs: verify
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./ -> target"

      - name: Build macOS bundles
        run: bash packaging/macos/build-app.sh

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coreamp-macos-bundles
          path: target/packages/macos/

      - name: Publish macOS release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/packages/macos/*
          draft: true
